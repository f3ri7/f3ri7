name: Generate Galaga contribution graph

on:
  # Si rigenera ogni giorno...
  schedule:
    - cron: "0 0 * * *"
  # ...e si può lanciare a mano dalla tab "Actions"
  workflow_dispatch:
  # ...e a ogni push su main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Generate Galaga SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: "galaga"

      - name: Push SVGs to the "output" branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
